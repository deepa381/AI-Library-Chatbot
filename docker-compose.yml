version: '3.8'

services:
  backend:
    build:
      context: ./library_backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./library_backend:/app
      - db-data:/app/db.sqlite3
    environment:
      - DEBUG=1
      - SECRET_KEY=django-insecure-your-secret-key
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./library_frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./library_frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  db-data:
